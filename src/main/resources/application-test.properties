# DATASOURCE
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# FLYWAY
spring.flyway.enabled=false

# REDIS
spring.data.redis.host=localhost
spring.data.redis.port=6370

# CACHE
spring.cache.type=none

# JWT
app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# STORAGE
app.storage.type=local
app.storage.local.upload-dir=/tmp/test-uploads

# IMAGE
app.image.max-size-bytes=2097152
app.image.allowed-types=image/jpeg,image/png
app.image.compression-quality=0.8
app.image.max-width=800
app.image.max-height=800
